name: Release Please

# Pull-based release flow: every push to main runs release-please, which
# maintains a single "release PR" with the next version bump + CHANGELOG
# entries derived from conventional commits. Merging that PR cuts a tag
# and a GitHub Release.
#
# Token note: with the default GITHUB_TOKEN, the tag/release that
# release-please creates does NOT trigger downstream workflows
# (GitHub's anti-recursion rule). To make the resulting v* tag also
# trigger the Docker build in deploy.yml, set the RELEASE_PAT secret
# (PAT with `contents: write` + `pull_requests: write`). Without it,
# you can still trigger deploy.yml manually by re-pushing the tag.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
